<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="circleView">
      <circle cx="50" cy="50" r="48" />
    </clipPath>
  </defs>
  
  <!-- Circular White Background -->
  <circle cx="50" cy="50" r="48" fill="white" />
  
  <!-- Diamond Shape (Mimicking the logo) -->
  <g clip-path="url(#circleView)">
    <path d="M50 15 L80 40 L50 85 L20 40 Z" fill="none" stroke="#000" stroke-width="2" />
    <path d="M20 40 L80 40 M50 15 L50 85 M35 27 L65 27" stroke="#000" stroke-width="1" opacity="0.3" />
    
    <!-- Code Symbol -->
    <path d="M45 45 L40 50 L45 55 M55 45 L60 50 L55 55" stroke="#00b4ff" stroke-width="2" fill="none" />
    
    <!-- Text Representation -->
    <text x="50" y="70" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#000">MASA</text>
  </g>
  
  <!-- Outer Gold Border for Premium Feel -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#c9a84c" stroke-width="3" />
</svg>
